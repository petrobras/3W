name: Tests and Coverage

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          filter: blob:none
          sparse-checkout: |
            /*
            !**/*.parquet
          sparse-checkout-cone-mode: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true

      - name: Install lychee
        run: |
          curl -sSL https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz
          sudo mv lychee /usr/local/bin/
          lychee --version

      - name: Make helper scripts executable
        run: chmod +x bin/lint

      - name: Create venv
        run: uv venv .venv

      - name: Install package with dev extras
        run: uv pip install -e .[dev]

      - name: Run lint
        run: uv run ./bin/lint

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          filter: blob:none
          sparse-checkout: |
            /*
            !**/*.parquet
          sparse-checkout-cone-mode: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true

      - name: Show versions
        run: |
          python --version
          uv --version

      - name: Make helper scripts executable
        run: chmod +x bin/test

      - name: Create venv
        run: uv venv .venv

      - name: Install package with dev extras
        run: uv pip install -e .[dev]

      - name: Testing
        run: uv run ./bin/test

      - name: Upload coverage to Coveralls
        if: matrix.python-version == '3.10'
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage.xml